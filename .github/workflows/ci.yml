name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Path filtering ────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ui: ${{ steps.filter.outputs.ui }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            ui:
              - 'ui/**'
            ci:
              - '.github/workflows/**'

  # ── Backend ───────────────────────────────────────────────────────
  be-lint:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  be-test:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cartwise_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CARTWISE_ENV: testing
      CARTWISE_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/cartwise_test"
      CARTWISE_SUPABASE_URL: "http://test"
      CARTWISE_SUPABASE_ANON_KEY: "test-key"
      CARTWISE_SUPABASE_JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen

      - name: Run tests with coverage
        id: test
        run: uv run pytest --ignore=tests/test_integration.py -v

      - name: Upload coverage to Codecov
        if: always() && steps.test.outcome == 'success'
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  migration-check:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cartwise_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CARTWISE_ENV: testing
      CARTWISE_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/cartwise_test"
      CARTWISE_SUPABASE_URL: "http://test"
      CARTWISE_SUPABASE_ANON_KEY: "test-key"
      CARTWISE_SUPABASE_JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --frozen

      - name: Apply all migrations
        run: uv run alembic upgrade head

      - name: Verify models match DB (no un-generated migrations)
        run: uv run alembic check

      - name: Verify last migration is reversible
        run: uv run alembic downgrade -1

      - name: Re-upgrade to head
        run: uv run alembic upgrade head

  # ── Frontend ──────────────────────────────────────────────────────
  fe-checks:
    needs: [changes]
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Lint
        run: bunx eslint .

  fe-build:
    needs: [changes]
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Build
        run: bunx next build

  # ── Cross-cutting ─────────────────────────────────────────────────
  openapi-drift:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cartwise_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      CARTWISE_ENV: testing
      CARTWISE_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/cartwise_test"
      CARTWISE_SUPABASE_URL: "http://test"
      CARTWISE_SUPABASE_ANON_KEY: "test-key"
      CARTWISE_SUPABASE_JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        run: cd backend && uv sync --frozen

      - name: Install frontend dependencies
        run: cd ui && bun install --frozen-lockfile

      - name: Apply migrations
        run: cd backend && uv run alembic upgrade head

      - name: Start backend
        run: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for backend
        run: timeout 30 bash -c 'until curl -sf http://localhost:8000/healthz; do sleep 1; done'

      - name: Generate fresh OpenAPI types
        run: cd ui && bunx openapi-typescript http://localhost:8000/openapi.json -o /tmp/schema.d.ts

      - name: Check for schema drift
        run: |
          if ! diff -u ui/lib/api/schema.d.ts /tmp/schema.d.ts; then
            echo ""
            echo "::error::OpenAPI schema is out of date. Run 'bun run generate:api' locally and commit the result."
            exit 1
          fi

      - name: Save openapi.json as artifact
        if: always()
        run: curl -sf http://localhost:8000/openapi.json -o /tmp/openapi.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openapi-spec
          path: /tmp/openapi.json

  dep-audit:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Audit Python dependencies
        working-directory: backend
        run: uvx pip-audit --requirement <(uv export --no-hashes)

      - uses: oven-sh/setup-bun@v2
      - name: Audit Node dependencies
        if: always()
        working-directory: ui
        run: bun install --frozen-lockfile && bun pm audit 2>/dev/null || npm audit --audit-level=high

  # ── Security ──────────────────────────────────────────────────────
  security-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Gate ──────────────────────────────────────────────────────────
  all-green:
    if: always()
    needs:
      - be-lint
      - be-test
      - migration-check
      - fe-checks
      - fe-build
      - openapi-drift
      - dep-audit
      - security-gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          results=(
            "${{ needs.be-lint.result }}"
            "${{ needs.be-test.result }}"
            "${{ needs.migration-check.result }}"
            "${{ needs.fe-checks.result }}"
            "${{ needs.fe-build.result }}"
            "${{ needs.openapi-drift.result }}"
            "${{ needs.dep-audit.result }}"
            "${{ needs.security-gitleaks.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Job failed with result: $r"
              exit 1
            fi
          done
          echo "All checks passed!"
