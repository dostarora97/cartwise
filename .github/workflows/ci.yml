name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: splitwise_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      MEALSPLIT_ENV: testing
      # Dynaconf reads MEALSPLIT_* env vars as overrides
      MEALSPLIT_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/splitwise_test"
      MEALSPLIT_SUPABASE_URL: "http://test"
      MEALSPLIT_SUPABASE_ANON_KEY: "test-key"
      MEALSPLIT_SUPABASE_JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - run: uv run pytest -v
