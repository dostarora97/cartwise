name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mealsplit_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      MEALSPLIT_ENV: testing
      MEALSPLIT_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5433/mealsplit_test"
      MEALSPLIT_SUPABASE_URL: "http://test"
      MEALSPLIT_SUPABASE_ANON_KEY: "test-key"
      MEALSPLIT_SUPABASE_JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run pytest --ignore=tests/test_integration.py -v

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
