[project]
name = "backend"
version = "0.1.0"
description = "MealSplit — grocery cost splitting with meal planning"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic==1.18.4",
    "asyncpg==0.31.0",
    "dynaconf==3.2.13",
    "fastapi==0.135.3",
    "httpx==0.28.1",
    "litellm==1.83.4",
    "pdfplumber==0.11.9",
    "pyjwt==2.12.1",
    "python-multipart==0.0.26",
    "sqlalchemy[asyncio]==2.0.49",
    "structlog==25.5.0",
    "supabase==2.15.1",
    "uvicorn[standard]==0.44.0",
]

[dependency-groups]
dev = [
    "pre-commit==4.5.1",
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "pytest-cov==7.1.0",
    "ruff==0.15.10",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"app/models/*.py" = ["F821"]      # forward references with from __future__ import annotations
"app/routes/*.py" = ["B008"]      # FastAPI uses Query() in defaults by design
"alembic/versions/*.py" = ["UP"]  # autogenerated by Alembic

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=app --cov-report=term-missing --cov-report=xml:coverage.xml"

[tool.coverage.run]
source = ["app"]
omit = ["app/__init__.py", "app/models/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__",
    "if TYPE_CHECKING",
]
show_missing = true
fail_under = 76
